<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng nhập — HọcViệt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #f0fdfa 0%, #ccfbf1 100%);
        margin: 0;
      }
      .login-card {
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 400px;
        text-align: center;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .login-card__logo {
        margin-bottom: 32px;
      }
      .login-card__title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #0f172a;
        margin-bottom: 12px;
      }
      .login-card__desc {
        color: #64748b;
        font-size: 0.875rem;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      .form-group {
        text-align: left;
        margin-bottom: 24px;
      }
      .form-group label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #334155;
        margin-bottom: 8px;
      }
      .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-family: inherit;
        transition: all 0.2s;
      }
      .form-group input:focus {
        border-color: #0f766e;
        outline: none;
        box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.1);
      }
      .btn--login {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        border-radius: 12px;
      }
      .login-card__footer {
        margin-top: 24px;
        font-size: 0.875rem;
        color: #94a3b8;
      }
      .login-card__footer a {
        color: #0f766e;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-card__logo">
        <a class="logo" href="index.html" style="justify-content: center;">
          <span class="logo__mark"></span>
          <span class="logo__text">Học<span>Việt</span></span>
        </a>
      </div>
      <h1 class="login-card__title">Chào mừng trở lại</h1>
      <p class="login-card__desc">Nhập tên hiển thị của bạn để truy cập vào sảnh học tập và các công cụ thông minh.</p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="display-name">Tên hiển thị</label>
          <input type="text" id="display-name" placeholder="Ví dụ: Minh Anh" required autofocus maxlength="50" />
        </div>
        <p id="login-error" style="color: #ef4444; font-size: 0.75rem; margin-top: -16px; margin-bottom: 16px; min-height: 1em;"></p>
        <button type="submit" class="btn btn--primary btn--login">Vào Sảnh Học Tập</button>
      </form>

      <div class="login-card__footer">
        <a href="index.html">Quay lại trang chủ</a>
      </div>
    </div>

    <script src="js/identity-shared.js"></script>
    <script>
      const form = document.getElementById('login-form');
      const input = document.getElementById('display-name');
      const error = document.getElementById('login-error');

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = input.value.trim();
        if (!name) {
          error.textContent = "Vui lòng nhập tên của bạn.";
          return;
        }

        // Use shared identity logic
        if (typeof window.setUserName === 'function') {
          window.setUserName(name);
        } else {
          // Fallback if script not loaded
          document.cookie = "userName=" + encodeURIComponent(name) + "; max-age=" + (60 * 60 * 24 * 30) + "; path=/; SameSite=Lax";
        }

        // Redirect to lobby
        window.location.href = 'lobby.html';
      });
    </script>
  </body>
</html>
